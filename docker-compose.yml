services:

  # ─── Frontend ─────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    hostname: frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      # Force polling so file-watching works on Docker Desktop (Windows/macOS)
      - WATCHPACK_POLLING=true
      - NEXT_TELEMETRY_DISABLED=1
    env_file: .env
    depends_on:
      agent:
        condition: service_healthy
    develop:
      watch:
        # Sync Next.js source — Next HMR picks up changes without restart
        - action: sync
          path: ./frontend/app
          target: /app/app
        - action: sync
          path: ./frontend/components
          target: /app/components
        - action: sync
          path: ./frontend/hooks
          target: /app/hooks
        - action: sync
          path: ./frontend/lib
          target: /app/lib
        - action: sync
          path: ./frontend/styles
          target: /app/styles
        - action: sync
          path: ./frontend/public
          target: /app/public
        - action: sync
          path: ./frontend/next.config.ts
          target: /app/next.config.ts
        - action: sync
          path: ./frontend/app-config.ts
          target: /app/app-config.ts
        # Rebuild when JS dependencies change
        - action: rebuild
          path: ./frontend/package.json
        - action: rebuild
          path: ./frontend/pnpm-lock.yaml

  # ─── Python Agent + API ───────────────────────────────────────────────────
  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    hostname: agent
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    env_file: .env
    volumes:
      - ./agent/tools/prompts.json:/app/tools/prompts.json
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    develop:
      watch:
        # Sync Python source into /app — uvicorn --reload picks up the changes.
        - action: sync
          path: ./agent
          target: /app
          ignore:
            - __pycache__/
            - "**/__pycache__"
            - "**/*.pyc"
            - .venv/
            - pyproject.toml
            - uv.lock
        # Rebuild when Python dependencies change (triggers uv sync in image).
        - action: rebuild
          path: ./agent/pyproject.toml
        - action: rebuild
          path: ./agent/uv.lock

  # ─── PostgreSQL ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    hostname: postgres
    ports:
      - "8877:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-emailagent}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    hostname: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Neo4j ────────────────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5
    hostname: neo4j
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/password}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_apoc_export_file_enabled: "true"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15

  # ─── Qdrant ───────────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    hostname: qdrant
    ports:
      - "6333:6333"   # HTTP / REST
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
  qdrant_data:
